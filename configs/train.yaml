# Training configuration for the LR baseline.
# Use configs/train_lightgbm.yaml and configs/train_xgboost.yaml for
# Week 2 alternatives.

experiment: churn-week2
run_name: lr-baseline
seed: 42

split:
  val_size: 0.15
  test_size: 0.15
  seed: 42

features:
  use_engineered: false

model:
  name: lr
  class_weight: null
  params:
    max_iter: 1000

tuning:
  enabled: false

calibration:
  enabled: false

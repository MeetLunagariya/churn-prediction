# Local stack: FastAPI service + Streamlit dashboard.
# Mount ./models so the API loads the artifact you built with `make build`.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: churn-api:1.0.0
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: churn-api:1.0.0
    container_name: churn-streamlit
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./app:/app/app:ro
    environment:
      CHURN_API_URL: "http://api:8000"
    command:
      [
        "streamlit",
        "run",
        "app/streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--browser.gatherUsageStats=false",
      ]
    restart: unless-stopped
